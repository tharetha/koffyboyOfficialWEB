<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | KoffyboyOfficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html" class="logo">KOFFYBOY<span class="logo-official">official</span></a>
        <div class="nav-links">
            <a href="music.html">Music</a>
            <a href="booking.html">Booking</a>
            <a href="store.html">Store</a>
        </div>
        <div class="auth-buttons">
            <a href="login.html" class="btn-login">Login</a>
        </div>
    </nav>

    <div class="form-container">
        <h2 style="margin-bottom: 1rem; text-align: center;">Join the Vibe</h2>
        <div id="signup-error" class="hidden" style="color: var(--error-color); margin-bottom: 1rem; text-align: center;"></div>
        <div id="signup-success" class="hidden" style="color: var(--success-color); margin-bottom: 1rem; text-align: center;">Registration successful! Redirecting to login...</div>
        <form id="signup-form">
            <div class="form-group">
                <label for="fname">First Name</label>
                <input type="text" id="fname" required>
            </div>
            <div class="form-group">
                <label for="lname">Last Name</label>
                <input type="text" id="lname" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" required placeholder="+260...">
            </div>
            <div class="form-group">
                <label for="email">Email (Optional)</label>
                <input type="email" id="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
        </form>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const first_name = document.getElementById('fname').value;
            const last_name = document.getElementById('lname').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            const errorEl = document.getElementById('signup-error');
            const successEl = document.getElementById('signup-success');
            
            errorEl.classList.add('hidden');

            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match!';
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('http://localhost:5000/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ first_name, last_name, phone_number: phone, email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successEl.classList.remove('hidden');
                    document.getElementById('signup-form').reset();
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorEl.textContent = data.error || 'Signup failed';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.textContent = 'Server error. Please try again.';
                errorEl.classList.remove('hidden');
            }
        });
    </script>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 KTS Technologies Ltd. All Rights Reserved.</p>
    </footer>
</body>
</html>
